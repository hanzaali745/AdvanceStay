{% extends "base.html" %}
{% block title %}Settings — My Supplier{% endblock %}
{% block content %}
<h1>Settings</h1>
<p class="muted">Business defaults used by the Profit and Risk agents. API credentials are configured via environment variables only (never stored here) — see .env.example.</p>

<div class="panel">
    <form method="post" action="/settings">
        <label>Minimum ROI %</label>
        <input type="number" step="0.1" name="min_roi_percent" value="{{ settings.min_roi_percent }}">
        <label>Minimum profit</label>
        <input type="number" step="0.01" name="min_profit_amount" value="{{ settings.min_profit_amount }}">
        <label>Default marketplace fee %</label>
        <input type="number" step="0.1" name="default_marketplace_fee_percent" value="{{ settings.default_marketplace_fee_percent }}">
        <label>Default shipping cost</label>
        <input type="number" step="0.01" name="default_shipping_cost" value="{{ settings.default_shipping_cost }}">
        <label>Default packaging cost</label>
        <input type="number" step="0.01" name="default_packaging_cost" value="{{ settings.default_packaging_cost }}">
        <label>Default returns allowance %</label>
        <input type="number" step="0.1" name="default_returns_allowance_percent" value="{{ settings.default_returns_allowance_percent }}">
        <label>Budget</label>
        <input type="number" step="0.01" name="default_budget" value="{{ settings.default_budget }}">
        <button class="btn" type="submit" style="margin-top:14px">Save</button>
    </form>
</div>
{% endblock %}
